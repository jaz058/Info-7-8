<!DOCTYPE html>
<html lang="en">
    <head>
        <title>
            Music Box
        </title>
        <script src="script.js"></script>
         <link href="style.css" rel="stylesheet">

    </head>
    <body>
         <h1>
            Music Box
         </h1>

         <div id="kick" class= "instrument">
            <h2>A</h2>
            <p>Kick</p>
         </div>

         <div id="snare" class= "instrument">
            <h2>S</h2>
            <p>Snare</p>
         </div>

         <div id="clap" class= "instrument">
            <h2>R</h2>
            <p>Clap</p>
         </div>

         <div id="cowbell" class= "instrument">
            <h2>F</h2>
            <p>Cowbell</p>
         </div>

         <div id="hihat" class= "instrument">
            <h2>D</h2>
            <p>Hihat</p>
         </div>

         <div id="openhat" class= "instrument">
            <h2>G</h2>
            <p>Openhat</p>
         </div>

         <div id="tom" class= "instrument">
            <h2>W</h2>
            <p>Tom</p>
         </div>

         <div id="yuh" class= "instrument">
            <h2>Q</h2>
            <p>Yuh</p>
         </div>

    </body>
</html>
